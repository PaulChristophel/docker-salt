name: Latest Python 3.11 Debian Release
run-name: "Latest Python 3.11 Debian Release (branch: ${{ github.ref_name }})"
on:
  push:
    # Pattern matched against refs/tags
    tags:
      - '[0-9]+.[0-9]+-[0-9]+'
jobs:
  build-python3-11-3006:
    runs-on: ubuntu-24.04
    env:
      DOCKER_USERNAME: pcm0
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - name: Get Build Version
        run: |
          echo "BUILD=${GITHUB_REF:10}" | tee -a $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" | tee -a $GITHUB_ENV
      - name: Python 3.11
        continue-on-error: true
        run: |
          podman pull python:3.11-slim
          podman build -f Python-debian.dockerfile --build-arg PYTHON_RELEASE=3.11-slim --build-arg FLAGS='--no-deps' --build-arg REQUIREMENTS=requirements-3006.txt --build-arg PYTHONPATH=/usr/local/salt/lib/python3.11 . \
                       -t docker.io/pcm0/salt:3.11-3006.16-debian \
                       -t docker.io/pcm0/salt:3.11-3006-debian \
                       -t docker.io/pcm0/salt:3.11-3006.16-${{ env.SHORT_SHA }}-debian
      - name: Push to Docker Hub
        run: |
          podman login docker.io --username $DOCKER_USERNAME --password $DOCKER_PASSWORD
          podman images | awk "/docker.io\/pcm0\/salt/ { print \$1\":\"\$2 }" | xargs -I {} podman push {}
          podman logout
      - name: Docker System Prune
        run: |
          podman system prune --force --all
  build-python3-11-3006-isalt:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: pcm0
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - name: Get Build Version
        run: |
          echo "BUILD=${GITHUB_REF:10}" | tee -a $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" | tee -a $GITHUB_ENV
      - name: Python 3.11
        continue-on-error: true
        run: |
          podman pull python:3.11-slim
          podman build -f Python-debian.dockerfile --build-arg PYTHON_RELEASE=3.11-slim --build-arg FLAGS='--no-deps' --build-arg REQUIREMENTS=requirements-3006-isalt.txt --build-arg PYTHONPATH=/usr/local/salt/lib/python3.11 . \
                       -t docker.io/pcm0/salt:3.11-3006.16-isalt-debian \
                       -t docker.io/pcm0/salt:3.11-3006-isalt-debian \
                       -t docker.io/pcm0/salt:3.11-3006.16-${{ env.SHORT_SHA }}-isalt-debian \
                       -t docker.io/pcm0/salt:3.11-3006.16-${{ env.SHORT_SHA }}-isalt \
                       -t docker.io/pcm0/salt:3.11-3006-${{ env.SHORT_SHA }}-isalt-debian \
                       -t docker.io/pcm0/salt:3.11-3006-${{ env.SHORT_SHA }}-isalt
      - name: Push to Docker Hub
        run: |
          podman login docker.io --username $DOCKER_USERNAME --password $DOCKER_PASSWORD
          podman images | awk "/docker.io\/pcm0\/salt/ { print \$1\":\"\$2 }" | xargs -I {} podman push {}
          podman logout
